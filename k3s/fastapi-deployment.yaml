apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-app
  namespace: em-auth
  labels:
    app: fastapi-app
    component: api
spec:
  replicas: 1
  # При replicas=1 RollingUpdate часто держит старый под в Terminating, пока новый не Ready —
  # на слабой ноде k3s это даёт таймаут rollout. Recreate: сначала остановка старого, потом новый.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: fastapi-app
      component: api
  template:
    metadata:
      labels:
        app: fastapi-app
        component: api
    spec:
      imagePullSecrets:
        - name: ${IMAGE_PULL_SECRET_NAME}
      containers:
        - name: fastapi
          image: ${CI_REGISTRY_IMAGE}:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - alembic -c alembic.ini upgrade head && python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 1
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: PROJECT_NAME
              valueFrom:
                configMapKeyRef:
                  name: em-auth-config
                  key: PROJECT_NAME
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: em-auth-config
                  key: ENVIRONMENT
            - name: API_HOST
              valueFrom:
                configMapKeyRef:
                  name: em-auth-config
                  key: API_HOST
            - name: API_PORT
              valueFrom:
                configMapKeyRef:
                  name: em-auth-config
                  key: API_PORT
            - name: ROOT_PATH
              valueFrom:
                configMapKeyRef:
                  name: em-auth-config
                  key: ROOT_PATH
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: em-auth-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: em-auth-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: em-auth-config
                  key: POSTGRES_DB
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: em-auth-config
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              valueFrom:
                configMapKeyRef:
                  name: em-auth-config
                  key: REFRESH_TOKEN_EXPIRE_DAYS
            - name: JWT_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: em-auth-config
                  key: JWT_ALGORITHM
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: em-auth-config
                  key: LOG_LEVEL
            - name: RATE_LIMIT_PER_MINUTE
              valueFrom:
                configMapKeyRef:
                  name: em-auth-config
                  key: RATE_LIMIT_PER_MINUTE
            - name: RATE_LIMIT_AUTH_PER_MINUTE
              valueFrom:
                configMapKeyRef:
                  name: em-auth-config
                  key: RATE_LIMIT_AUTH_PER_MINUTE
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: em-auth-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: em-auth-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: em-auth-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: em-auth-secrets
                  key: SECRET_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
