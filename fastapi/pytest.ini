[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
asyncio_default_fixture_loop_scope = function
markers =
    auth: тесты аутентификации
    users: тесты пользовательских сценариев
    access: тесты управления правилами доступа
    mock: тесты mock-ресурсов
    e2e: end-to-end тесты полных пользовательских сценариев
    slow: медленные интеграционные сценарии
