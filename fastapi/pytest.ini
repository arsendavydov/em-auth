[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
asyncio_default_fixture_loop_scope = function
markers =
    auth: тесты аутентификации, login/refresh/logout и JWT-токенов
    users: тесты пользовательских сценариев, профиля и управления ролями
    access: тесты RBAC, admin API и правил доступа
    mock: тесты mock-ресурсов и проверки прав доступа к ним
    e2e: end-to-end тесты полных пользовательских сценариев поверх HTTP API
    slow: медленные интеграционные/e2e-сценарии с реальной БД и/или сетью
